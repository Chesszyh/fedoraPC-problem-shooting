site_name: Chesszyh Reports
site_url: https://report.chesszyh.xyz/
repo_url: https://github.com/Chesszyh/fedoraPC-problem-shooting
repo_name: Chesszyh/fedoraPC-problem-shooting

docs_dir: docs
site_dir: site
use_directory_urls: true

theme:
  name: material
  language: zh
  font: false
  features:
    - navigation.indexes
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow
    - content.code.copy
  palette:
    - scheme: default
      primary: teal
      accent: rose

extra_css:
  - stylesheets/extra.css

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
